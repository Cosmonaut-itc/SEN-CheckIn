# docker-compose.test.yaml
name: sen-checkin-test
services:
  postgres:
    image: postgres:17
    container_name: sen-checkin-postgres-test
    restart: unless-stopped
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${SEN_CHECKIN_PG_PASSWORD:-postgres}
      POSTGRES_DB: sen_checkin_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sen_checkin_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sen_checkin_pgdata_test:/var/lib/postgresql/data
volumes:
  sen_checkin_pgdata_test:
